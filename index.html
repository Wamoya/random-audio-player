<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <title>Yo más</title>
        <link rel="stylesheet" href="styles/style.css">
        <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    </head>
    <body>
        <div id="main_container">
            <div id="control_pannel">
                <label id="browse-input" for="folder"><img src="img/folder.png" style="width: 2rem"></label>
                <input type="file" id="folder" webkitdirectory multiple accept="audio/*">
            </div>

            <div class="main_pannel">
                <br>
                <button onclick="playRandom()">
                    <div class="shuffle-button">
                        <img src="img/shuffle-green.png" alt="Play random audio" style="width: 25px">
                    </div>
                </button>
                <p style="display: inline" id="queueLength" style="padding-bottom:1rem">Upload audio files first</p>

                <div style="display: block">
                    <button onclick="toggleShowName()">
                        <div>
                            <p>Toggle show</p>
                        </div>
                    </button>
                    <button onclick="removeFromQueue()">
                        <div>
                            <p>Remove from queue</p>
                        </div>
                    </button>
                </div>

                <div style="min-height:2.5rem; background-color: var(--color1); padding: 2px 4px 2px 4px; border-radius: 4px;">
                    <p id="filename" style="margin: 0px"></p>
                </div>

                <br>

                <audio id="player" controls></audio>
            </div>
        </div>
        <script src="scripts/main.js"></script>
    </body>
</html>
